spring:
  application:
    name: weeklyreport

  # H2 인메모리 데이터베이스 (개발용)
  datasource:
    url: jdbc:h2:mem:weeklyreport;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # 앱 시작 시 스키마 자동 생성, 종료 시 삭제
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 웹 콘솔: http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
